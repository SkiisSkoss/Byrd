- type: entity
  parent: [ ClothingBackpack ]
  id: GoblinMadeClothingBackpackTrashBlue
  name: trashpack
  description: This bad boy can fit so much trash!
  components:
  - type: Sprite
    sprite: _NF/Clothing/Back/Backpacks/trashpack_blue.rsi
  - type: GoblinMade
  - type: Dumpable
  - type: Storage
    quickInsert: true
    areaInsert: true
    storageOpenSound:
      collection: trashBagRustle
    storageInsertSound:
      collection: trashBagRustle
    whitelist:
      tags:
        - Cartridge
        - Trash
      components:
        - GoblinMade
  - type: Tag
    tags:
    - Recyclable
  - type: Construction
    graph: GoblinMadeClothingBackpackTrashBlue
    node: goblin_tool

